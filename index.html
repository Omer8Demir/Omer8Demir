<html lang="en">
<head>

    <style>

    </style>
</head>

    <div class="main-container">
        <div class="stream-box">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/b_h1tP0i65k" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="data-panel">
            <h2>Market Pulse (Global)</h2>
            <div id="market-data" style="font-size: 1.2em; color: #00ff00;">
                Gold: <strong>$2,350</strong> | S&P 500: <strong>5,280</strong> | USD/TRY: <strong>32.25</strong>
            </div>
        </div>

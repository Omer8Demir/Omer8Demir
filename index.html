<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VisionPanel - Global Terminal</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; border: 2px solid #00d4ff; border-radius: 10px; background: #111; margin-bottom: 20px; }
        .donate-btn { background: #ff00ff; color: #fff; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: #111; border: 1px solid #444; padding: 20px; border-radius: 15px; }
        h2 { color: #00d4ff; text-align: center; font-size: 1.2em; }
        /* 7'li Liste Tablosu */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; color: #fff; }
    </style>
</head>
<body>

    <div class="header-bar">
        <h2 style="margin:0;">Global Veri Terminali v2.0</h2>
        <a href="https://nowpayments.io/donation?api_key=b7e0cf29-c2e0-48da-8a6e-225bf1b5fdcd" target="_blank" class="donate-btn">BAĞIŞ YAP</a>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>Piyasa Haberleri</h2>
            <iframe src="https://cryptopanic.com/widgets/news/?color=dark&bg_color=111111&text_color=ffffff" style="width:100%; height:300px; border:none;"></iframe>
        </div>

        <div class="card">
            <h2>7'li Takip Listesi</h2>
            <table>
                <tr><th>Proje</th><th>Durum</th></tr>
                <tr><td>ONDO</td><td style="color:#00ff9d;">Takipte</td></tr>
                <tr><td>TIA</td><td style="color:#00ff9d;">Takipte</td></tr>
                <tr><td>OM</td><td style="color:#00ff9d;">Takipte</td></tr>
                <tr><td>IO</td><td style="color:#00ff9d;">Takipte</td></tr>
                <tr><td>ZEC</td><td style="color:#00ff9d;">Takipte</td></tr>
                <tr><td>ZKP</td><td style="color:#00ff9d;">Takipte</td></tr>
                <tr><td>MONAD</td><td style="color:#00ff9d;">Takipte</td></tr>
            </table>
        </div>

        <div class="card">
            <h2>Oyun Arşivi</h2>
            <p style="text-align:center; color:#666;">Flash oyunlar için aşağıdaki butonu kullan:</p>
            <button onclick="window.open('https://ruffle.rs/demo/')" style="width:100%; padding:15px; background:#00d4ff; border:none; border-radius:5px; cursor:pointer;">OYUNLARI BAŞLAT</button>
        </div>
    </div>
</body>
</html>

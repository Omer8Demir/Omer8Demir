<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Global Veri Terminali</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .top-container { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .box { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #00d4ff; width: 300px; }
        .video-center { flex: 1; min-width: 300px; display: flex; justify-content: center; align-items: center; background: #111; border-radius: 10px; border: 1px solid #444; min-height: 200px; }
        .donation-text { color: #00d4ff; font-size: 0.8em; margin-bottom: 10px; font-weight: bold; text-align: center; }
        .btn-list { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 10px; }
        .btn-list a { font-size: 0.7em; padding: 4px 8px; background: #222; color: #fff; text-decoration: none; border: 1px solid #444; border-radius: 4px; }
        .btn-list a:hover { background: #00d4ff; color: #000; }
        .search-box { width: 100%; max-width: 600px; padding: 15px; border-radius: 10px; border: 2px solid #00d4ff; background: #111; color: #fff; font-size: 1.2em; display: block; margin: 20px auto; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        h3 { color: #00d4ff; margin: 0; }
        .data { font-size: 0.85em; color: #ccc; margin: 2px 0; }
        .saat-text { color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="text-align:center;">Global Veri Terminali (195 Ülke)</h1>
    
    <div class="top-container">
        <div class="box">
            <p class="donation-text">Support stray animals. 80% of all future donations will be dedicated to food, water, and veterinary care for stray animals.</p>
            <div style="text-align: center;">
                <a href="https://nowpayments.io/donation?api_key=b7e0cf29-c2e0-48da-8a6e-225bf1b5fdcd" target="_blank" style="color: #00d4ff; text-decoration: underline; font-size: 0.9em; font-weight: bold;">Donate Here</a>
            </div>
        </div>

        <div class="video-center">
            <p style="color: #666;">Video İçeriği Buraya Gelecek</p>
        </div>

        <div class="box">
            <p class="donation-text">CEX Exchanges</p>
            <div class="btn-list">
                <a href="https://www.binance.com" target="_blank">Binance</a><a href="https://www.coinbase.com" target="_blank">Coinbase</a><a href="https://www.okx.com" target="_blank">OKX</a>
            </div>
            <p class="donation-text" style="margin-top:15px;">DEX Exchanges</p>
            <div class="btn-list">
                <a href="https://uniswap.org" target="_blank">Uniswap</a><a href="https://pancakeswap.finance" target="_blank">PancakeSwap</a>
            </div>
        </div>
    </div>

    <input type="text" class="search-box" id="arama" placeholder="Ülke ara..." oninput="filtrele()">
    <div class="grid" id="liste"></div>

    <script>
        // Örnek: tz (Timezone) değerlerini buraya eklemelisin
        const ulkeler = [
            {n: "Türkiye", nf: "87.926.082", p: "1,06%", a: "769.630", tz: "Europe/Istanbul"},
            {n: "Amerika Birleşik Devletleri", nf: "349.035.494", p: "4,20%", a: "9.147.420", tz: "America/New_York"}
            // Diğer ülkeleri buraya aynı yapıda ekle...
        ];

        function saatiGuncelle() {
            document.querySelectorAll('.saat-el').forEach(el => {
                const tz = el.getAttribute('data-tz');
                el.innerText = new Date().toLocaleTimeString("tr-TR", {timeZone: tz});
            });
        }

        function filtrele() {
            const aranan = document.getElementById('arama').value.toLowerCase();
            const liste = document.getElementById('liste');
            liste.innerHTML = '';
            ulkeler.filter(u => u.n.toLowerCase().includes(aranan)).forEach(u => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<h3>${u.n}</h3>
                                 <p class="data">Nüfus: ${u.nf}</p>
                                 <p class="data">Dünya Payı: ${u.p}</p>
                                 <p class="data">Saat: <span class="saat-el" data-tz="${u.tz}">--:--:--</span></p>`;
                liste.appendChild(div);
            });
        }

        setInterval(saatiGuncelle, 1000);
        filtrele();
    </script>
</body>
</html>

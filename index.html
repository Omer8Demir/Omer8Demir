<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VisionPanel | Canlı Piyasa Terminali</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .ana-yayin { width: 100vw; height: 80vh; background: #000; }
        iframe { width: 100%; height: 100%; }
        .serit-kutusu { height: 20vh; background: #d00; display: flex; align-items: center; overflow: hidden; border-top: 4px solid #fff; }
        #ticker { font-size: 2em; font-weight: bold; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="ana-yayin">
        <iframe src="https://www.youtube.com/embed/jfKfPfyJRdk" frameborder="0" allowfullscreen></iframe>
    </div>

    <div class="serit-kutusu">
        <div id="ticker" class="kayan-yazi">Veriler Yükleniyor...</div>
    </div>

    <script>
        // Binance API kullanarak tüm kripto verilerini çekme
        async function fetchCrypto() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/price');
                const data = await response.json();
                // Önemli olanları filtrele ve metne dönüştür
                const filter = data.filter(item => ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT', 'XRPUSDT', 'ADAUSDT'].includes(item.symbol));
                const tickerText = filter.map(item => `${item.symbol.replace('USDT', '')}: $${parseFloat(item.price).toFixed(2)}`).join(' | ');
                document.getElementById('ticker').innerText = tickerText + " | " + new Date().toLocaleTimeString();
            } catch (error) {
                console.error("Veri çekilemedi:", error);
            }
        }
        
        // 3 saniyede bir güncelle
        setInterval(fetchCrypto, 3000);
        fetchCrypto();
    </script>
</body>
</html>

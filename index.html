<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Data Terminal</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Arial', sans-serif; margin: 0; padding: 20px; }
        /* Header Panel */
        .header-panel { background: #111; padding: 15px; border-bottom: 2px solid #00d4ff; text-align: center; margin-bottom: 20px; }
        .donation-btn { background: #00d4ff; color: #000; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; }
        
        /* Exchange Buttons */
        .nav-buttons { text-align: center; margin-bottom: 20px; }
        .btn { padding: 10px 25px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .cex-btn { background: #f3ba2f; }
        .dex-btn { background: #764abc; color: #fff; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 10px; text-align: center; }
        a { color: #00d4ff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-panel">
        <h1>Global Data Terminal</h1>
        <p>Support street animals! Every donation helps our furry friends in need.</p>
        <a href="https://nowpayments.io/embeds/donation-widget?api_key=b7e0cf29-c2e0-48da-8a6e-225bf1b5fdcd" class="donation-btn">Donate for Stray Animals</a>
    </div>

    <div class="nav-buttons">
        <button class="btn cex-btn" onclick="filterExchanges('CEX')">CEX Platforms</button>
        <button class="btn dex-btn" onclick="filterExchanges('DEX')">DEX Platforms</button>
        <button class="btn" onclick="filterExchanges('ALL')" style="background:#555; color:#fff;">All</button>
    </div>

    <div class="grid" id="exchange-list"></div>

    <script>
        const exchanges = [
            {n: "Binance", type: "CEX", url: "https://www.binance.com"},
            {n: "Coinbase", type: "CEX", url: "https://www.coinbase.com"},
            {n: "Kraken", type: "CEX", url: "https://www.kraken.com"},
            {n: "Uniswap", type: "DEX", url: "https://app.uniswap.org"},
            {n: "PancakeSwap", type: "DEX", url: "https://pancakeswap.finance"},
            {n: "Jupiter", type: "DEX", url: "https://jup.ag"}
        ];

        function filterExchanges(type) {
            const list = document.getElementById('exchange-list');
            list.innerHTML = '';
            exchanges.forEach(ex => {
                if (type === 'ALL' || ex.type === type) {
                    list.innerHTML += `<div class="card">
                        <h3>${ex.n}</h3>
                        <p>${ex.type}</p>
                        <a href="${ex.url}" target="_blank">Visit Site</a>
                    </div>`;
                }
            });
        }
        filterExchanges('ALL');
    </script>
</body>
</html>



<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Global Veri Terminali</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .search-box { width: 100%; max-width: 600px; padding: 15px; border-radius: 10px; border: 2px solid #00d4ff; background: #111; color: #fff; font-size: 1.2em; display: block; margin: 20px auto; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        h3 { color: #00d4ff; margin: 0; }
        .data { font-size: 0.85em; color: #ccc; margin: 2px 0; }
        
        /* Bağış widget'ı için dar ve yatay düzenleme */
        .donation-container { 
            text-align: center; 
            margin: 40px auto; 
            padding: 10px; 
            max-width: 400px; /* Genişliği daralttık */
            border: 1px solid #222;
            border-radius: 15px;
            background: #0a0a0a;
        }
    </style>
</head>
<body>

    <h1 style="text-align:center;">Global Veri Terminali (195 Ülke)</h1>
    <input type="text" class="search-box" id="arama" placeholder="Ülke ara..." oninput="filtrele()">
    
    <div class="grid" id="liste"></div>

    <!-- Bağış Widget'ı (Daraltılmış) -->
    <div class="donation-container">
        <h4 style="color: #00d4ff; margin-bottom: 10px;">Projeye Destek Ol</h4>
        <iframe src="https://nowpayments.io/embeds/donation-widget?api_key=b7e0cf29-c2e0-48da-8a6e-225bf1b5fdcd" 
                width="320" height="500" frameborder="0" scrolling="no" style="border-radius: 10px;">
        </iframe>
    </div>

    <script>
        const ulkeler = [
            {n: "Hindistan", nf: "1.476.625.576", p: "17,79%", a: "2.973.190"}, {n: "Çin", nf: "1.412.914.089", p: "17,02%", a: "9.388.211"}, {n: "Amerika Birleşik Devletleri", nf: "349.035.494", p: "4,20%", a: "9.147.420"}, {n: "Endonezya", nf: "287.886.782", p: "3,47%", a: "1.811.570"}, {n: "Pakistan", nf: "259.299.791", p: "3,12%", a: "770.880"}, {n: "Nijerya", nf: "242.431.832", p: "2,92%", a: "910.770"}, {n: "Brezilya", nf: "213.562.666", p: "2,57%", a: "8.358.140"}, {n: "Bangladeş", nf: "177.818.044", p: "2,14%", a: "130.170"}, {n: "Rusya", nf: "143.394.458", p: "1,73%", a: "16.376.870"}, {n: "Etiyopya", nf: "138.902.185", p: "1,67%", a: "1.000.000"}, {n: "Meksika", nf: "132.997.658", p: "1,60%", a: "1.943.950"}, {n: "Japonya", nf: "122.427.731", p: "1,47%", a: "364.555"}, {n: "Mısır", nf: "120.101.175", p: "1,45%", a: "995.450"}, {n: "Filipinler", nf: "117.724.471", p: "1,42%", a: "298.170"}, {n: "Kongo DC", nf: "116.452.162", p: "1,40%", a: "2.267.050"}, {n: "Vietnam", nf: "102.177.431", p: "1,23%", a: "310.070"}, {n: "İran", nf: "93.168.497", p: "1,12%", a: "1.628.550"}, {n: "Türkiye", nf: "87.926.082", p: "1,06%", a: "769.630"}, {n: "Almanya", nf: "83.644.258", p: "1,01%", a: "348.560"}, {n: "Tanzanya", nf: "72.563.780", p: "0,87%", a: "885.800"}
        ];

        function filtrele() {
            const aranan = document.getElementById('arama').value.toLowerCase();
            const liste = document.getElementById('liste');
            liste.innerHTML = '';
            ulkeler.filter(u => u.n.toLowerCase().includes(aranan)).forEach(u => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<h3>${u.n}</h3>
                                 <p class="data">Nüfus: ${u.nf}</p>
                                 <p class="data">Dünya Payı: ${u.p}</p>
                                 <p class="data">Yüzölçümü: ${u.a} km²</p>`;
                liste.appendChild(div);
            });
        }
        filtrele();
    </script>
</body>
</html>
